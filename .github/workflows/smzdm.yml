name: 什么值得买自动签到

on:
  schedule:
    # 每天北京时间 05:07 运行 (UTC 前一日 21:07)，叠加 GitHub 排队延迟通常落在 06-07 点，稳稳早于 08:00
    # 2026-07-08 从 01:37 挪早修正：原时间加排队延迟落到凌晨 3 点太早，用户要求控制在早上八点前但别半夜签
    # 避开整点：GitHub Actions 整点任务排队严重，容易大幅延迟甚至被跳过
    # 2026-07-05 曾因风控 11111 暂停；换用 App 抓包 cookie（自带 device_id，
    # 脚本自动推导 sk）后 dispatch 验证签到成功，恢复调度
    - cron: '7 21 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
    - name: 检出代码
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: 设置 Node.js
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
      with:
        node-version: '24'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 运行签到
      env:
        TZ: Asia/Shanghai
        SMZDM_COOKIE: ${{ secrets.SMZDM_COOKIE }}
        SMZDM_SK: ${{ secrets.SMZDM_SK }}
        SMZDM_COMMENT: ${{ vars.SMZDM_COMMENT }}
        SMZDM_CROWD_SILVER_5: ${{ vars.SMZDM_CROWD_SILVER_5 }}
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        BARK_KEY: ${{ secrets.BARK_KEY }}
        BARK_URL: ${{ secrets.BARK_URL }}
        BARK_GROUP: ${{ secrets.BARK_GROUP }}
        BARK_ICON: ${{ secrets.BARK_ICON }}
        BARK_SOUND: ${{ secrets.BARK_SOUND }}
      run: |
        echo "===== 什么值得买签到 ====="
        node smzdm/smzdm_checkin.js
        echo "===== 什么值得买每日任务 ====="
        node smzdm/smzdm_task.js

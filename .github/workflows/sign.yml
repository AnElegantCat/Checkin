name: 九号出行自动签到

on:
  schedule:
    # 每天北京时间 07:37 运行 (UTC 23:37)
    # 避开整点：GitHub Actions 整点任务排队严重，容易大幅延迟甚至被跳过
    - cron: '37 23 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  sign:
    runs-on: ubuntu-latest
    # 脚本在定时触发时会随机延迟 0-10 分钟，超时需覆盖延迟 + 重试
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
    - name: 检出代码
      # 按 commit SHA 固定第三方 action，防上游标签被恶意移动（公开仓库 + Secrets 的标准加固）
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: 设置 Node.js
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
      with:
        node-version: '24'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 运行签到
      env:
        # runner 默认 UTC，统一为北京时间，保证日志和推送里的时间正确
        TZ: Asia/Shanghai
        NINEBOT_DEVICE_ID: ${{ secrets.NINEBOT_DEVICE_ID }}
        NINEBOT_AUTHORIZATION: ${{ secrets.NINEBOT_AUTHORIZATION }}
        NINEBOT_NAME: ${{ secrets.NINEBOT_NAME }}
        NINEBOT_ACCOUNTS: ${{ secrets.NINEBOT_ACCOUNTS }}
        BARK_KEY: ${{ secrets.BARK_KEY }}
        BARK_URL: ${{ secrets.BARK_URL }}
        BARK_GROUP: ${{ secrets.BARK_GROUP }}
        BARK_ICON: ${{ secrets.BARK_ICON }}
        BARK_SOUND: ${{ secrets.BARK_SOUND }}
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      run: node sign_ninebot.js

name: Keep Alive

# GitHub 会在仓库 60 天无活动后暂停定时工作流。
# 用官方 enable API 重置计时器即可，不再制造空提交污染历史。
on:
  schedule:
    # 每月 15 号 UTC 00:41（北京时间 08:41）
    - cron: '41 0 15 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    # 只在源仓库运行；fork 用户请留意 GitHub 的暂停提醒邮件并手动恢复
    if: github.event.repository.fork == false
    permissions:
      actions: write
    steps:
    - name: 重新启用定时工作流（重置 60 天暂停计时器）
      run: |
        for wf in sign.yml keepalive.yml; do
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$wf/enable"
          echo "enabled: $wf"
        done
